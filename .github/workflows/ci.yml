name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Pas de .env en CI → on fournit des PUBLIC_* factices pour que svelte-kit sync
    # génère bien les types $env/static/public (la vraie sécurité = RLS, pas ces clés).
    env:
      PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Vérifs sécurité deps (bloquant à partir de "high").
      - run: npm audit --audit-level=high
      - run: npm run check
      - run: npm test
      # Build avec un base path pour valider la prod.
      - run: npm run build
        env:
          BASE_PATH: /orchestrateur-maths974
