name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Vérifs sécurité deps (bloquant à partir de "high").
      - run: npm audit --audit-level=high
      - run: npm run check
      - run: npm test
      # Build avec un base path pour valider la prod (clés factices : RLS = vraie sécurité).
      - run: npm run build
        env:
          BASE_PATH: /orchestrateur-maths974
          PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
